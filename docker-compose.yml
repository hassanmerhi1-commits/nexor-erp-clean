version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: kwanza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kwanza_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yel3an7azi}
    ports:
      - "5432:5432"
    volumes:
      - kwanza_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kwanza_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  kwanza_pgdata:
    driver: local
